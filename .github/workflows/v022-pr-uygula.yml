name: v0.2.2 düzeltmesini uygula

on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/v022_apply.py'
      - '.github/workflows/v022-pr-uygula.yml'

permissions:
  contents: write

jobs:
  uygula:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Kaynak düzeltmesini uygula
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/v022_apply.py
          git checkout -- .github/workflows/build-pkg-release.yml
          rm -f tools/v022_apply.py
          rm -f src/HttpClientTurkceV022.tmp
          rm -f v022-run.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/HttpClientTurkce.cpp Makefile
          git add -u tools/v022_apply.py src/HttpClientTurkceV022.tmp v022-run.log
          git commit -m 'İndirmeyi tek açık dosya oturumunda sürdür'
          git push origin "HEAD:${GITHUB_HEAD_REF}"
