name: v0.2.2 düzeltmesini uygula

on:
  pull_request:
    branches: [main]
    paths:
      - 'tools/v022_apply.py'
      - '.github/workflows/v022-pr-uygula.yml'

permissions:
  contents: write

jobs:
  uygula:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Kaynak düzeltmesini uygula
        shell: bash
        run: |
          set +e
          python3 tools/v022_apply.py > v022-run.log 2>&1
          durum=$?
          set -e
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add v022-run.log
          git commit -m 'v0.2.2 uygulama tanısını kaydet' || true
          git push origin "HEAD:${GITHUB_HEAD_REF}"
          exit "$durum"
