name: Düzeltmeyi uygula son

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  uygula:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Düzeltme dalını al
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Gömülü yamayı uygula
        shell: bash
        run: |
          set -euo pipefail
          awk '
            /PATCH_B64/ {
              sayac++
              if (sayac == 1) { oku=1; next }
              if (sayac == 2) { exit }
            }
            oku {
              sub(/^[[:space:]]+/, "")
              print
            }
          ' .github/workflows/kaynak-incele.yml > /tmp/psforcer-duzeltme.patch.gz.b64
          base64 -d /tmp/psforcer-duzeltme.patch.gz.b64 | gzip -d > /tmp/psforcer-duzeltme.patch
          git apply --check --exclude=.github/workflows/kaynak-incele.yml /tmp/psforcer-duzeltme.patch
          git apply --exclude=.github/workflows/kaynak-incele.yml /tmp/psforcer-duzeltme.patch
          rm -f .github/workflows/kaynak-incele.yml
          rm -f .github/workflows/duzeltme-uygulayici-onar.yml
          rm -f .github/workflows/duzeltmeyi-uygula-son.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'İndirme çökmesini gider ve uzak görselleri etkinleştir'
          git push origin "HEAD:${GITHUB_HEAD_REF}"
