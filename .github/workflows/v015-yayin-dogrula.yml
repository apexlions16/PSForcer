name: v0.1.5 yayınını doğrula

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/v015-yayin-dogrula.yml'

permissions:
  contents: write

jobs:
  dogrula:
    runs-on: ubuntu-latest
    steps:
      - name: Kaynakları al
        uses: actions/checkout@v4

      - name: Yayın ve paket varlıklarını bekle
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          for deneme in $(seq 1 30); do
            if gh release view v0.1.5 --json tagName,publishedAt,url,assets > /tmp/yayin.json 2>/dev/null; then
              paket_sayisi="$(jq '[.assets[] | select(.name == "IV0000-PSFC00001_00-PSFORCERCLIENT00.pkg")] | length' /tmp/yayin.json)"
              ozet_sayisi="$(jq '[.assets[] | select(.name == "IV0000-PSFC00001_00-PSFORCERCLIENT00.pkg.sha256")] | length' /tmp/yayin.json)"
              if [ "$paket_sayisi" -eq 1 ] && [ "$ozet_sayisi" -eq 1 ]; then
                break
              fi
            fi
            if [ "$deneme" -eq 30 ]; then
              echo 'v0.1.5 yayın varlıkları zamanında hazır olmadı.' >&2
              exit 1
            fi
            sleep 10
          done

          mkdir -p release
          jq '{etiket:.tagName,yayin_tarihi:.publishedAt,adres:.url,varliklar:[.assets[] | {ad:.name,boyut:.size,durum:"yüklendi",indirme_adresi:.url}]}' /tmp/yayin.json > release/durum-v015.json

      - name: Doğrulama kaydını ana dala yaz
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add release/durum-v015.json
          git commit -m 'v0.1.5 yayın varlıklarını doğrula [skip ci]'
          git push
