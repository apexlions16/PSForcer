name: v0.1.6 kod düzeltmelerini uygula

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  uygula:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Kaynak kodu ve kataloğu güncelle
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import json

          # HTTP: Hugging Face salt-okunur belirteç desteği ve açık 401/403 iletisi.
          http = Path('src/HttpClientTurkce.cpp')
          text = http.read_text()
          old = '''namespace {
          std::mutex gHttpRuntimeMutex;
          int gNetPoolId = 0;
          int gSslContextId = 0;
          int gHttpContextId = 0;
          unsigned int gHttpUsers = 0;
          }
          '''
          new = '''namespace {
          std::mutex gHttpRuntimeMutex;
          int gNetPoolId = 0;
          int gSslContextId = 0;
          int gHttpContextId = 0;
          unsigned int gHttpUsers = 0;

          bool isHuggingFaceUrl(const std::string& url) {
              return url.compare(0, 23, "https://huggingface.co/") == 0;
          }

          std::string huggingFaceToken() {
              return trim(readFirstLine("/data/psforcer/hf_token.txt"));
          }
          }
          '''
          if old not in text:
              raise SystemExit('HTTP yardımcı blok bulunamadı')
          text = text.replace(old, new, 1)

          old = '''    requestId = sceHttpCreateRequestWithURL(connectionId, ORBIS_METHOD_GET, url.c_str(), 0);
              if (requestId < 0) {
                  error = PSF_ISTEK;
                  goto cleanup;
              }

              sceHttpSetResolveTimeOut(requestId, 15 * 1000 * 1000);
          '''
          new = '''    requestId = sceHttpCreateRequestWithURL(connectionId, ORBIS_METHOD_GET, url.c_str(), 0);
              if (requestId < 0) {
                  error = PSF_ISTEK;
                  goto cleanup;
              }

              sceHttpAddRequestHeader(requestId, "Accept", "application/octet-stream", 0);
              if (isHuggingFaceUrl(url)) {
                  const std::string token = huggingFaceToken();
                  if (!token.empty()) {
                      const std::string authorization = "Bearer " + token;
                      sceHttpAddRequestHeader(requestId, "Authorization", authorization.c_str(), 0);
                  }
              }

              sceHttpSetResolveTimeOut(requestId, 15 * 1000 * 1000);
          '''
          if old not in text:
              raise SystemExit('HTTP istek bloğu bulunamadı')
          text = text.replace(old, new, 1)

          old = '''    if (statusCode != 200 && statusCode != 206) {
                  std::ostringstream durum;
                  durum << "İndirme isteği başarısız oldu; durum kodu: " << statusCode;
                  error = durum.str();
                  goto cleanup;
              }
          '''
          new = '''    if (statusCode != 200 && statusCode != 206) {
                  if (statusCode == 401 && isHuggingFaceUrl(url)) {
                      error = "Hugging Face erişimi reddetti (401): hf_token.txt gerekli veya depo herkese açık olmalı";
                  } else if (statusCode == 403 && isHuggingFaceUrl(url)) {
                      error = "Hugging Face erişimi reddetti (403): belirteç iznini ve depo erişimini denetleyin";
                  } else {
                      std::ostringstream durum;
                      durum << "İndirme isteği başarısız oldu; durum kodu: " << statusCode;
                      error = durum.str();
                  }
                  goto cleanup;
              }
          '''
          if old not in text:
              raise SystemExit('HTTP durum bloğu bulunamadı')
          text = text.replace(old, new, 1)
          http.write_text(text)

          # Steam benzeri daha büyük görsel başlık ve dolu ekran görüntüsü kutuları.
          ui = Path('src/Ui.cpp')
          text = ui.read_text()
          start = text.index('void Ui::drawDetail(')
          end = text.index('void Ui::drawDownload(', start)
          replacement = r'''void Ui::drawDetail(const CatalogItem& item, size_t selectedPackage, const std::string& status) {
              const Color arkaPlan(8, 11, 20);
              const Color panel(15, 20, 34, 238);
              const int baslikYuksekligi = 500;

              fillRect(0, 0, kEkranGenisligi, kEkranYuksekligi, arkaPlan);

              SDL_Texture* kahraman = texture(item.media.hero);
              SDL_Texture* kapak = texture(item.media.cover);
              if (kahraman) drawImage(kahraman, 0, 0, kEkranGenisligi, baslikYuksekligi, true);
              else fillRect(0, 0, kEkranGenisligi, baslikYuksekligi,
                            karistir(item.accent, Color(7, 10, 19), 0.48f));

              fillRect(0, 0, kEkranGenisligi, baslikYuksekligi, Color(3, 5, 10, 92));
              for (int i = 0; i < 12; ++i) {
                  const uint8_t alfa = static_cast<uint8_t>(210 - i * 14);
                  fillRect(i * 90, 0, 90, baslikYuksekligi, Color(4, 6, 12, alfa));
              }
              fillRect(0, 330, kEkranGenisligi, 170, Color(7, 10, 18, 205));

              drawText(item.title, 74, 82, 72, Color(255, 255, 255), 1120);
              std::ostringstream ust;
              ust << item.developer << "  /  " << item.genre << "  /  " << item.releaseYear;
              drawText(ust.str(), 78, 190, 26, Color(232, 236, 246), 1200);
              drawBadge(item.packages.empty() ? "KATALOG" : packageKindName(item.packages[0].kind),
                        78, 248, item.accent);
              if (!item.media.trailer.empty()) drawBadge("VİDEO", 248, 248, Color(220, 76, 113));
              if (!item.media.screenshots.empty()) {
                  std::ostringstream g;
                  g << item.media.screenshots.size() << " GÖRSEL";
                  drawBadge(g.str(), 368, 248, Color(66, 157, 217));
              }

              if (kapak) {
                  fillRect(1370, 66, 480, 284, Color(7, 10, 18, 220));
                  drawImage(kapak, 1382, 78, 456, 260, true);
                  strokeRect(1370, 66, 480, 284, Color(255, 255, 255, 115), 2);
              }

              fillRect(0, 420, kEkranGenisligi, 598, Color(8, 11, 20, 248));
              fillRect(48, 438, 720, 510, panel);
              fillRect(800, 438, 1072, 510, panel);

              drawText("HAKKINDA", 72, 466, 24, Color(132, 145, 174));
              drawWrapped(item.description, 72, 508, 650, 22, 35,
                          Color(226, 231, 242), 5);

              drawText("PAKETLER", 832, 466, 24, Color(132, 145, 174));
              for (size_t i = 0; i < item.packages.size(); ++i) {
                  const PackageInfo& paket = item.packages[i];
                  const int y = 510 + static_cast<int>(i) * 100;
                  const bool secili = i == selectedPackage;
                  if (secili) fillRect(816, y - 8, 1028, 88, saydam(item.accent, 205));
                  fillRect(830, y, 1000, 72, secili ? Color(31, 38, 60) : Color(20, 26, 43));
                  drawBadge(packageKindName(paket.kind), 850, y + 18, item.accent);
                  drawText(paket.label, 1048, y + 11, 25, Color(248, 250, 255), 440);
                  std::ostringstream surum;
                  surum << "SÜRÜM " << paket.version;
                  if (!paket.minFirmware.empty()) surum << "  YAZILIM " << paket.minFirmware;
                  drawText(surum.str(), 1048, y + 45, 17, Color(137, 148, 174), 440);
                  drawText(CatalogLoader::formatBytes(paket.sizeBytes), 1590, y + 23, 21,
                           Color(229, 233, 243), 210);
              }

              if (!item.media.screenshots.empty()) {
                  drawText("GÖRSELLER", 72, 722, 22, Color(132, 145, 174));
                  const size_t adet = std::min<size_t>(3, item.media.screenshots.size());
                  for (size_t i = 0; i < adet; ++i) {
                      const int x = 72 + static_cast<int>(i) * 222;
                      const int y = 760;
                      fillRect(x, y, 204, 115, Color(22, 28, 46));
                      SDL_Texture* goruntu = texture(item.media.screenshots[i]);
                      if (!goruntu) goruntu = kahraman;
                      if (!goruntu) goruntu = kapak;
                      if (goruntu) {
                          drawImage(goruntu, x, y, 204, 115, true);
                      } else {
                          fillRect(x, y, 204, 115,
                                   karistir(item.accent, Color(10, 13, 22), 0.58f));
                          drawText("GÖRSEL", x + 58, y + 46, 18,
                                   Color(235, 239, 248, 180), 100);
                      }
                      strokeRect(x, y, 204, 115, Color(105, 119, 151), 2);
                  }
              }

              fillRect(0, 1018, kEkranGenisligi, 62, Color(14, 18, 31));
              drawText("DAİRE GERİ", 54, 1037, 20, Color(224, 228, 240));
              drawText("KARE İNDİR", 280, 1037, 20, Color(224, 228, 240));
              drawText(status, 1130, 1037, 18, Color(110, 202, 181), 730);
          }

          '''
          text = text[:start] + replacement + text[end:]
          ui.write_text(text)

          # Yerleşik ve uzaktaki katalog artık paket içine alınan güvenilir medyayı kullanır.
          for filename in ('assets/catalog.json', 'catalog/katalog.json'):
              path = Path(filename)
              data = json.loads(path.read_text())
              item = data['items'][0]
              item['media']['cover'] = '/app0/assets/media/pt/cover.jpg'
              item['media']['hero'] = '/app0/assets/media/pt/header.jpg'
              item['media']['screenshots'] = [
                  '/app0/assets/media/pt/screenshot-1.jpg',
                  '/app0/assets/media/pt/screenshot-2.jpg',
                  '/app0/assets/media/pt/screenshot-3.jpg',
              ]
              data['updatedAt'] = '2026-07-12T14:15:00Z'
              path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n')

          # Uygulama ve yayın sürümü.
          makefile = Path('Makefile')
          text = makefile.read_text().replace('VERSION     := 0.15', 'VERSION     := 0.16')
          makefile.write_text(text)

          workflow = Path('.github/workflows/build-pkg-release.yml')
          text = workflow.read_text()
          text = text.replace('YAYIN_ETIKETI: v0.1.5', 'YAYIN_ETIKETI: v0.1.6')
          text = text.replace('ESKI_YAYIN_ETIKETI: v0.1.4', 'ESKI_YAYIN_ETIKETI: v0.1.5')
          text = text.replace("PSForcer v0.1.5 İndirme Kararlılığı ve Uzak Görseller",
                              "PSForcer v0.1.6 Yetkilendirme ve Büyük Görsel Başlık")
          old_note = "Kare düğmesine basıldığında oluşan CE-34878-0 hatasına karşı PS4 iş parçacığı ve ağ başlatma düzeni yenilendi. Büyük HTTP tamponu heap alanına taşındı, dosya boyutu doğrulaması eklendi, uzak kapak ve arka plan görselleri geçici önbellekten gösterilmeye başlandı. Katalog artık GitHub üzerinden açılışta yenilenir; katalog değişiklikleri yeni uygulama sürümü oluşturmaz."
          new_note = "Hugging Face HTTP 401 yanıtı için salt-okunur belirteç desteği ve açıklayıcı hata iletisi eklendi. P.T. kapak, header ve ekran görüntüleri paket içine alındı. Ayrıntı ekranı daha büyük Steam benzeri görsel başlıkla yenilendi. Katalog değişiklikleri tek başına yeni uygulama sürümü oluşturmaz."
          text = text.replace(old_note, new_note)
          workflow.write_text(text)

          readme = Path('README.md')
          text = readme.read_text()
          marker = '## Derleme\n'
          section = '''## Hugging Face erişimi\n\nHerkese açık Hugging Face dosyaları ek ayar gerektirmez. Bir paket bağlantısı `401` döndürürse depo özel veya erişim denetimli olabilir. Yetkili kullanıcı, yalnızca okuma izni olan belirtecini PS4 üzerinde aşağıdaki dosyaya tek satır olarak yazabilir:\n\n```text\n/data/psforcer/hf_token.txt\n```\n\nBelirteç GitHub kataloğuna, uygulama paketine veya ekran görüntülerine kesinlikle eklenmemelidir. PSForcer belirteci yalnızca `https://huggingface.co/` isteklerinde `Authorization: Bearer` başlığı olarak kullanır.\n\n'''
          if section not in text:
              text = text.replace(marker, section + marker)
          readme.write_text(text)
          PY

          rm -f .github/workflows/v016-kod-uygula.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m '401 yetkilendirmesini, görselleri ve büyük başlığı düzelt'
          git push origin "HEAD:${GITHUB_HEAD_REF}"
