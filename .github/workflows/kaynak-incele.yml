name: İndirme çökmesi düzeltmesini uygula

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  uygula:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Düzeltme dalını al
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Doğrulanmış düzeltme yamasını uygula
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/psforcer-duzeltme.patch.gz.b64 <<'PATCH_B64'
          
          PATCH_B64
          sed -i 's/^[[:space:]]*//' /tmp/psforcer-duzeltme.patch.gz.b64
          base64 -d /tmp/psforcer-duzeltme.patch.gz.b64 | gzip -d > /tmp/psforcer-duzeltme.patch
          git apply --check /tmp/psforcer-duzeltme.patch
          git apply /tmp/psforcer-duzeltme.patch
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'İndirme çökmesini gider ve uzak görselleri etkinleştir'
          git push origin "HEAD:${GITHUB_HEAD_REF}"
