name: v0.1.8 goto derleme hatasını onar

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/v018-goto-onar.yml'

permissions:
  contents: write

jobs:
  onar:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Değişken bildirimini goto etiketinden önceye taşı
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/HttpClientTurkce.cpp')
          text = path.read_text()
          old = '''    uint64_t total = 0;
              uint64_t downloaded = 0;
              std::string currentUrl = url;'''
          new = '''    uint64_t total = 0;
              uint64_t downloaded = 0;
              uint64_t rangeTotal = 0;
              std::string currentUrl = url;'''
          if old not in text:
              raise SystemExit('Değişken ekleme noktası bulunamadı')
          text = text.replace(old, new, 1)
          old = '    const uint64_t rangeTotal = contentRangeTotal(responseHeaderValue(requestId, "Content-Range"));'
          new = '    rangeTotal = contentRangeTotal(responseHeaderValue(requestId, "Content-Range"));'
          if old not in text:
              raise SystemExit('Range toplam satırı bulunamadı')
          text = text.replace(old, new, 1)
          path.write_text(text)
          PY

          rm -f .github/workflows/v018-goto-onar.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'OpenOrbis goto değişken kapsamını düzelt'
          git push origin "HEAD:${GITHUB_HEAD_REF}"
