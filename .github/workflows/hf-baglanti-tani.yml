name: Hugging Face bağlantısını tanıla

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/hf-baglanti-tani.yml'

permissions:
  contents: write

jobs:
  tani:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Anonim istek ve yönlendirmeleri denetle
        shell: bash
        run: |
          set -u
          URL='https://huggingface.co/datasets/glm-labs/entroylab/resolve/main/PPCH4/CUSA01127-USA.pkg'
          {
            echo '=== REPO API ==='
            curl -sS -D - -o /tmp/repo.json 'https://huggingface.co/api/datasets/glm-labs/entroylab' || true
            python3 - <<'PY'
          import json
          try:
              d=json.load(open('/tmp/repo.json'))
              print({k:d.get(k) for k in ('id','private','gated','disabled','sha')})
          except Exception as e:
              print('API_JSON_HATASI',e)
          PY
            echo '=== ILK YANIT ==='
            curl -sS -I --max-time 30 --user-agent 'PSForcer/0.17' "$URL" || true
            echo '=== YONLENDIRMELER ==='
            curl -sS -I -L --max-time 60 --max-redirs 10 --user-agent 'PSForcer/0.17' "$URL" || true
            echo '=== 1 BAYT GET ==='
            curl -sS -D - -o /dev/null --max-time 60 --max-redirs 10 -L \
              --range 0-0 --user-agent 'PSForcer/0.17' --header 'Accept: application/octet-stream' "$URL" || true
          } | tee hf-tani.txt
      - uses: actions/upload-artifact@v4
        with:
          name: hf-baglanti-tani
          path: hf-tani.txt
