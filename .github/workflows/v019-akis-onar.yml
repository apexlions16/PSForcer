name: v0.1.9 akış düzeltmelerini uygula

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/v019-akis-onar.yml'

permissions:
  contents: write

jobs:
  onar:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Kaynakları güvenli biçimde düzelt
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          http = Path('src/HttpClientTurkce.cpp')
          text = http.read_text()
          old = '''    uint64_t requestedStart = existing;
              uint64_t requestedEnd = 0;
              bool rangeRequested = false;'''
          new = '''    uint64_t requestedStart = existing;
              uint64_t requestedEnd = 0;
              ContentRangeInfo contentRange;
              bool rangeRequested = false;'''
          if old not in text:
              raise SystemExit('ContentRange bildirim noktası bulunamadı')
          text = text.replace(old, new, 1)

          old = '    const ContentRangeInfo contentRange = parseContentRange(responseHeaderValue(requestId, "Content-Range"));'
          new = '    contentRange = parseContentRange(responseHeaderValue(requestId, "Content-Range"));'
          if old not in text:
              raise SystemExit('ContentRange atama noktası bulunamadı')
          text = text.replace(old, new, 1)

          old = '''        if (cacheAttempt && (statusCode == 401 || statusCode == 403 ||
                                     statusCode == 404 || statusCode == 416)) {'''
          new = '''        if (cacheAttempt && (statusCode == 401 || statusCode == 403 ||
                                     statusCode == 404 || statusCode == 416 ||
                                     (statusCode == 200 && existing > 0 && rangeRequested))) {'''
          if old not in text:
              raise SystemExit('CDN önbellek yenileme koşulu bulunamadı')
          text = text.replace(old, new, 1)
          http.write_text(text)

          ui = Path('src/Ui.cpp')
          text = ui.read_text()
          old = '    if (!snapshot.error.empty()) drawText(snapshot.error, x + 360, y + 180, 17, Color(239, 103, 121), 550);'
          new = '''    if ((snapshot.state == DownloadState::Failed || snapshot.state == DownloadState::Cancelled) &&
              !snapshot.error.empty()) {
              drawText(snapshot.error, x + 360, y + 180, 17, Color(239, 103, 121), 550);
              } else if (snapshot.state == DownloadState::Running && snapshot.bytesPerSecond > 0) {
              std::ostringstream hiz;
              hiz << CatalogLoader::formatBytes(snapshot.bytesPerSecond) << "/S";
              drawText(hiz.str(), x + 710, y + 180, 18, Color(110, 202, 181), 200);
              } else if (!snapshot.status.empty()) {
              drawText(snapshot.status, x + 360, y + 180, 17, Color(137, 148, 173), 550);
              }'''
          if old not in text:
              raise SystemExit('İndirme bilgi satırı bulunamadı')
          text = text.replace(old, new, 1)
          ui.write_text(text)
          PY

          rm -f .github/workflows/v019-akis-onar.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'OpenOrbis kapsamını ve indirme hız göstergesini düzelt'
          git push origin "HEAD:${GITHUB_HEAD_REF}"
