name: v0.2.3 kaynak düzeltmesini uygula

on:
  push:
    branches: [duzeltme/tamamlama-v023]
    paths:
      - 'tools/v023_apply.py'
      - '.github/workflows/v023-apply.yml'
  pull_request:
    branches: [main]
    paths:
      - 'tools/v023_apply.py'
      - '.github/workflows/v023-apply.yml'

permissions:
  contents: write

jobs:
  uygula:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Kaynak düzeltmesini uygula
        shell: bash
        run: |
          set +e
          python3 tools/v023_apply.py > v023-run.log 2>&1
          durum=$?
          set -e

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          if [ "$durum" -ne 0 ]; then
            git add v023-run.log
            git commit -m 'v0.2.3 kaynak düzeltme tanısını kaydet' || true
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
            exit "$durum"
          fi

          rm -f tools/v023_apply.py
          rm -f .github/workflows/v023-apply.yml
          rm -f v023-run.log
          git add -A
          git commit -m 'Tam boyutta sunucu kapanışını beklemeden indirimi bitir'
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
