name: v0.2.3 kaynak düzeltmesini uygula

on:
  push:
    branches: [duzeltme/tamamlama-v023]
    paths:
      - 'tools/v023_apply.py'
      - '.github/workflows/v023-apply.yml'

permissions:
  contents: write

concurrency:
  group: v023-kaynak-duzeltme
  cancel-in-progress: true

jobs:
  uygula:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: duzeltme/tamamlama-v023
          fetch-depth: 0

      - name: Kaynak düzeltmesini uygula
        shell: bash
        run: |
          # Tekil yeniden çalıştırma: v0.2.3
          set +e
          python3 tools/v023_apply.py > v023-run.log 2>&1
          durum=$?
          set -e

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          if [ "$durum" -ne 0 ]; then
            git add v023-run.log
            git commit -m 'v0.2.3 kaynak düzeltme tanısını kaydet' || true
            git pull --rebase origin duzeltme/tamamlama-v023
            git push origin HEAD:duzeltme/tamamlama-v023
            exit "$durum"
          fi

          rm -f tools/v023_apply.py
          rm -f .github/workflows/v023-apply.yml
          rm -f v023-run.log
          git add -A
          git commit -m 'Tam boyutta sunucu kapanışını beklemeden indirimi bitir'
          git pull --rebase origin duzeltme/tamamlama-v023
          git push origin HEAD:duzeltme/tamamlama-v023
