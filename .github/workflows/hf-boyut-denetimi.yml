name: Hugging Face paket boyutunu denetle

on:
  pull_request:
    branches: [main]

jobs:
  boyut-denetimi:
    name: P.T. paket boyutunu ölç
    runs-on: ubuntu-latest
    steps:
      - name: Hugging Face dosya bilgisini oku
        shell: bash
        run: |
          set -euo pipefail
          url='https://huggingface.co/datasets/glm-labs/entroylab/resolve/main/PPCH4/CUSA01127-USA.pkg'
          api='https://huggingface.co/api/datasets/glm-labs/entroylab/tree/main/PPCH4?recursive=false&expand=true'

          api_yaniti="$(curl --fail --silent --show-error --location --retry 3 "$api")"
          hedef="$(echo "$api_yaniti" | jq -c '.[] | select(.path == "PPCH4/CUSA01127-USA.pkg")' | head -n 1)"
          test -n "$hedef"

          api_boyutu="$(echo "$hedef" | jq -r '.size // empty')"
          oid="$(echo "$hedef" | jq -r '.lfs.oid // .oid // empty')"

          basliklar="$(curl --silent --show-error --location --head --retry 3 -H 'Range: bytes=0-0' "$url")"
          aralik_boyutu="$(printf '%s\n' "$basliklar" | tr -d '\r' | awk 'BEGIN{IGNORECASE=1} /^content-range:/ {split($3,a,"/"); print a[2]}' | tail -n 1)"
          bagli_boyut="$(printf '%s\n' "$basliklar" | tr -d '\r' | awk 'BEGIN{IGNORECASE=1} /^x-linked-size:/ {print $2}' | tail -n 1)"
          icerik_boyutu="$(printf '%s\n' "$basliklar" | tr -d '\r' | awk 'BEGIN{IGNORECASE=1} /^content-length:/ {print $2}' | tail -n 1)"

          boyut="${api_boyutu:-${aralik_boyutu:-${bagli_boyut:-$icerik_boyutu}}}"
          test -n "$boyut"
          test "$boyut" -gt 0
          test "${#oid}" -eq 64

          gib="$(awk -v b="$boyut" 'BEGIN { printf "%.3f", b / 1024 / 1024 / 1024 }')"
          mib="$(awk -v b="$boyut" 'BEGIN { printf "%.2f", b / 1024 / 1024 }')"
          oid_ilk="${oid:0:32}"
          oid_son="${oid:32:32}"
          echo "PT_DOSYA_YOLU=PPCH4/CUSA01127-USA.pkg"
          echo "PT_PAKET_BOYUT_BAYT=$boyut"
          echo "PT_PAKET_BOYUT_MIB=$mib"
          echo "PT_PAKET_BOYUT_GIB=$gib"

          jq -n \
            --arg yol 'PPCH4/CUSA01127-USA.pkg' \
            --arg url "$url" \
            --arg sha256_ilk "$oid_ilk" \
            --arg sha256_son "$oid_son" \
            --argjson boyut "$boyut" \
            --arg mib "$mib" \
            --arg gib "$gib" \
            '{yol:$yol,url:$url,boyut:$boyut,mib:$mib,gib:$gib,sha256_ilk:$sha256_ilk,sha256_son:$sha256_son}' \
            > pt-paket-bilgisi.json

      - name: Paket bilgisini sakla
        uses: actions/upload-artifact@v4
        with:
          name: pt-paket-bilgisi
          path: pt-paket-bilgisi.json
