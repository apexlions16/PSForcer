name: Hugging Face 401 düzeltme dalını hazırla

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/hf-401-yama.yml'

permissions:
  contents: write

jobs:
  hazirla:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Düzeltme dalını oluştur ve yamayı uygula
        shell: bash
        run: |
          set -euo pipefail
          git switch -c duzeltme/hf-401-anonim-yedek-v018
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/HttpClientTurkce.cpp')
          text = path.read_text()

          old = '''std::string huggingFaceToken() {
              const std::string token = trim(readFirstLine("/data/psforcer/hf_token.txt"));
              if (token.empty() || token[0] == '#') return std::string();
              return token;
          }
          '''
          new = '''std::string huggingFaceToken() {
              std::string token = trim(readFirstLine("/data/psforcer/hf_token.txt"));
              if (token.empty() || token[0] == '#') return std::string();
              if (token.compare(0, 7, "Bearer ") == 0) token = trim(token.substr(7));
              if (token.size() >= 2 && token[0] == '\"' && token[token.size() - 1] == '\"') {
                  token = token.substr(1, token.size() - 2);
              }
              return trim(token);
          }
          '''
          if old not in text:
              raise SystemExit('Token yöntemi bulunamadı')
          text = text.replace(old, new, 1)

          start = text.index('    requestId = sceHttpCreateRequestWithURL(connectionId, ORBIS_METHOD_GET, url.c_str(), 0);')
          end = text.index('    if (statusCode == 200 && existing > 0) existing = 0;', start)
          replacement = '''    const bool huggingFace = isHuggingFaceUrl(url);
              const std::string token = huggingFace ? huggingFaceToken() : std::string();
              bool tokenIleDenenmis = false;
              bool anonimYedekDenenmis = false;

              for (int deneme = 0; deneme < 2; ++deneme) {
                  const bool tokenKullan = huggingFace && !token.empty() && deneme == 0;
                  if (deneme == 1 && (!tokenIleDenenmis || statusCode != 401)) break;

                  requestId = sceHttpCreateRequestWithURL(connectionId, ORBIS_METHOD_GET, url.c_str(), 0);
                  if (requestId < 0) {
                      error = PSF_ISTEK;
                      goto cleanup;
                  }

                  sceHttpAddRequestHeader(requestId, "Accept", "application/octet-stream", 0);
                  if (tokenKullan) {
                      const std::string authorization = "Bearer " + token;
                      sceHttpAddRequestHeader(requestId, "Authorization", authorization.c_str(), 0);
                      tokenIleDenenmis = true;
                  } else if (deneme == 1) {
                      anonimYedekDenenmis = true;
                  }

                  sceHttpSetResolveTimeOut(requestId, 15 * 1000 * 1000);
                  sceHttpSetConnectTimeOut(requestId, 20 * 1000 * 1000);
                  sceHttpSetSendTimeOut(requestId, 20 * 1000 * 1000);

                  if (existing > 0) {
                      std::ostringstream range;
                      range << "bytes=" << existing << '-';
                      if (sceHttpAddRequestHeader(requestId, "Range", range.str().c_str(), 0) < 0) {
                          existing = 0;
                      }
                  }

                  if (sceHttpSendRequest(requestId, NULL, 0) < 0) {
                      error = PSF_GONDER;
                      goto cleanup;
                  }

                  if (sceHttpGetStatusCode(requestId, &statusCode) < 0) {
                      error = PSF_DURUM;
                      goto cleanup;
                  }

                  if (statusCode == 200 || statusCode == 206) break;
                  if (statusCode == 401 && tokenKullan) {
                      sceHttpDeleteRequest(requestId);
                      requestId = 0;
                      continue;
                  }
                  break;
              }

              if (statusCode != 200 && statusCode != 206) {
                  if (statusCode == 401 && huggingFace) {
                      if (tokenIleDenenmis && anonimYedekDenenmis) {
                          error = "Hugging Face hem belirteçli hem anonim isteği reddetti (401): bağlantı, depo türü veya dosya yolu hatalı";
                      } else if (token.empty()) {
                          error = "Hugging Face anonim isteği reddetti (401): depo herkese açık değil, erişim onayı gerekli veya bağlantı hatalı";
                      } else {
                          error = "Hugging Face belirteci reddetti (401): yeni salt-okunur belirteç oluşturup PS4 veri dosyasına yazın";
                      }
                  } else if (statusCode == 403 && huggingFace) {
                      error = "Hugging Face erişimi reddetti (403): belirteç iznini, erişim onayını ve depo durumunu denetleyin";
                  } else {
                      std::ostringstream durum;
                      durum << "İndirme isteği başarısız oldu; durum kodu: " << statusCode;
                      error = durum.str();
                  }
                  goto cleanup;
              }

          '''
          text = text[:start] + replacement + text[end:]
          text = text.replace('PSForcer/0.17', 'PSForcer/0.18')
          path.write_text(text)

          makefile = Path('Makefile')
          makefile.write_text(makefile.read_text().replace('VERSION     := 0.17', 'VERSION     := 0.18'))

          workflow = Path('.github/workflows/build-pkg-release.yml')
          r = workflow.read_text()
          r = r.replace('YAYIN_ETIKETI: v0.1.7', 'YAYIN_ETIKETI: v0.1.8')
          r = r.replace('ESKI_YAYIN_ETIKETI: v0.1.6', 'ESKI_YAYIN_ETIKETI: v0.1.7')
          r = r.replace('PSForcer v0.1.7 Token Dosyası Hazırlığı', 'PSForcer v0.1.8 Hugging Face 401 Dayanıklılığı')
          r = r.replace(
              'Uygulama ilk açılışta /data/psforcer/hf_token.txt dosyasını otomatik oluşturur. Paket içinde güvenli ve gerçek token içermeyen bir şablon bulunur. Şablon satırları yetkilendirme değeri olarak gönderilmez.',
              'Hugging Face belirteci hatalı veya süresi dolmuşsa herkese açık depolar için anonim istek otomatik yeniden denenir. Bearer öneki ve tırnak işaretleri ayıklanır; 401 hata iletileri ayrıntılandırılır.')
          workflow.write_text(r)
          PY

          rm -f .github/workflows/hf-401-yama.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Hugging Face 401 durumunda anonim yedek istek ekle'
          git push origin HEAD:duzeltme/hf-401-anonim-yedek-v018
