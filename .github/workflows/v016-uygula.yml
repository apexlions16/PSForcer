name: v0.1.6 düzeltmelerini uygula

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/v016-uygula.yml'

permissions:
  contents: write

jobs:
  uygula:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Arayüz, katalog ve sürüm düzeltmelerini yaz
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import json

          ui_cpp = Path('src/Ui.cpp')
          ui_text = ui_cpp.read_text()
          old_signature = 'void Ui::drawDetail(const CatalogItem& item, size_t selectedPackage, const std::string& status) {'
          if old_signature not in ui_text:
              raise SystemExit('Eski drawDetail yöntemi bulunamadı')
          ui_cpp.write_text(ui_text.replace(old_signature,
              'void Ui::drawDetailLegacy(const CatalogItem& item, size_t selectedPackage, const std::string& status) {', 1))

          ui_h = Path('src/Ui.h')
          header = ui_h.read_text()
          marker = 'private:\n    SDL_Texture* texture(const std::string& path);'
          replacement = '''private:
              void drawDetailLegacy(const CatalogItem& item,
                                    size_t selectedPackage,
                                    const std::string& status);
              SDL_Texture* texture(const std::string& path);'''
          replacement = '\n'.join(line[4:] if line.startswith('    ') else line for line in replacement.splitlines())
          if marker not in header:
              raise SystemExit('Ui.h ekleme noktası bulunamadı')
          ui_h.write_text(header.replace(marker, replacement, 1))

          detail_source = r'''#include "Ui.h"
          #include "Catalog.h"

          #include <algorithm>
          #include <sstream>

          namespace psforcer {

          void Ui::drawDetail(const CatalogItem& item, size_t selectedPackage, const std::string& status) {
              const int ekranW = 1920;
              const int ekranH = 1080;
              const int headerH = 500;
              const Color panel(15, 20, 34, 238);

              fillRect(0, 0, ekranW, ekranH, Color(8, 11, 20));

              SDL_Texture* hero = texture(item.media.hero);
              SDL_Texture* cover = texture(item.media.cover);
              if (hero) drawImage(hero, 0, 0, ekranW, headerH, true);
              else fillRect(0, 0, ekranW, headerH, Color(item.accent.r / 2, item.accent.g / 2, item.accent.b / 2));

              fillRect(0, 0, ekranW, headerH, Color(3, 5, 10, 82));
              for (int i = 0; i < 13; ++i) {
                  const int alpha = std::max(28, 214 - i * 15);
                  fillRect(i * 90, 0, 92, headerH, Color(4, 6, 12, static_cast<uint8_t>(alpha)));
              }
              fillRect(0, 330, ekranW, 170, Color(7, 10, 18, 205));

              drawText(item.title, 74, 76, 72, Color(255, 255, 255), 1120);
              std::ostringstream metadata;
              metadata << item.developer << "  /  " << item.genre << "  /  " << item.releaseYear;
              drawText(metadata.str(), 78, 188, 26, Color(232, 236, 246), 1200);
              drawBadge(item.packages.empty() ? "KATALOG" : packageKindName(item.packages[0].kind),
                        78, 248, item.accent);
              if (!item.media.trailer.empty()) drawBadge("VİDEO", 248, 248, Color(220, 76, 113));
              if (!item.media.screenshots.empty()) {
                  std::ostringstream count;
                  count << item.media.screenshots.size() << " GÖRSEL";
                  drawBadge(count.str(), 368, 248, Color(66, 157, 217));
              }

              if (cover) {
                  fillRect(1366, 62, 488, 292, Color(7, 10, 18, 225));
                  drawImage(cover, 1378, 74, 464, 268, true);
                  strokeRect(1366, 62, 488, 292, Color(255, 255, 255, 120), 2);
              }

              fillRect(0, 420, ekranW, 598, Color(8, 11, 20, 248));
              fillRect(48, 438, 720, 510, panel);
              fillRect(800, 438, 1072, 510, panel);

              drawText("HAKKINDA", 72, 466, 24, Color(132, 145, 174));
              drawWrapped(item.description, 72, 508, 650, 22, 35, Color(226, 231, 242), 5);

              drawText("PAKETLER", 832, 466, 24, Color(132, 145, 174));
              for (size_t i = 0; i < item.packages.size(); ++i) {
                  const PackageInfo& package = item.packages[i];
                  const int y = 510 + static_cast<int>(i) * 100;
                  const bool selected = i == selectedPackage;
                  if (selected) fillRect(816, y - 8, 1028, 88, Color(item.accent.r, item.accent.g, item.accent.b, 205));
                  fillRect(830, y, 1000, 72, selected ? Color(31, 38, 60) : Color(20, 26, 43));
                  drawBadge(packageKindName(package.kind), 850, y + 18, item.accent);
                  drawText(package.label, 1048, y + 11, 25, Color(248, 250, 255), 440);
                  std::ostringstream version;
                  version << "SÜRÜM " << package.version;
                  if (!package.minFirmware.empty()) version << "  YAZILIM " << package.minFirmware;
                  drawText(version.str(), 1048, y + 45, 17, Color(137, 148, 174), 440);
                  drawText(CatalogLoader::formatBytes(package.sizeBytes), 1590, y + 23, 21,
                           Color(229, 233, 243), 210);
              }

              if (!item.media.screenshots.empty()) {
                  drawText("GÖRSELLER", 72, 722, 22, Color(132, 145, 174));
                  const size_t count = std::min<size_t>(3, item.media.screenshots.size());
                  for (size_t i = 0; i < count; ++i) {
                      const int x = 72 + static_cast<int>(i) * 222;
                      const int y = 760;
                      fillRect(x, y, 204, 115, Color(22, 28, 46));
                      SDL_Texture* image = texture(item.media.screenshots[i]);
                      if (!image) image = hero;
                      if (!image) image = cover;
                      if (image) drawImage(image, x, y, 204, 115, true);
                      else {
                          fillRect(x, y, 204, 115, Color(item.accent.r / 2, item.accent.g / 2, item.accent.b / 2));
                          drawText("GÖRSEL", x + 58, y + 46, 18, Color(235, 239, 248, 180), 100);
                      }
                      strokeRect(x, y, 204, 115, Color(105, 119, 151), 2);
                  }
              }

              fillRect(0, 1018, ekranW, 62, Color(14, 18, 31));
              drawText("DAİRE GERİ", 54, 1037, 20, Color(224, 228, 240));
              drawText("KARE İNDİR", 280, 1037, 20, Color(224, 228, 240));
              drawText(status, 1130, 1037, 18, Color(110, 202, 181), 730);
          }

          }  // namespace psforcer
          '''
          detail_source = '\n'.join(line[10:] if line.startswith('          ') else line for line in detail_source.splitlines()) + '\n'
          Path('src/UiDetailV016.cpp').write_text(detail_source)

          for filename in ('assets/catalog.json', 'catalog/katalog.json'):
              path = Path(filename)
              data = json.loads(path.read_text())
              item = data['items'][0]
              item['media']['cover'] = '/app0/assets/media/pt/cover.jpg'
              item['media']['hero'] = '/app0/assets/media/pt/header.jpg'
              item['media']['screenshots'] = [
                  '/app0/assets/media/pt/screenshot-1.jpg',
                  '/app0/assets/media/pt/screenshot-2.jpg',
                  '/app0/assets/media/pt/screenshot-3.jpg'
              ]
              data['updatedAt'] = '2026-07-12T14:20:00Z'
              path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n')

          makefile = Path('Makefile')
          makefile.write_text(makefile.read_text().replace('VERSION     := 0.15', 'VERSION     := 0.16'))

          release = Path('.github/workflows/build-pkg-release.yml')
          release_text = release.read_text()
          release_text = release_text.replace('YAYIN_ETIKETI: v0.1.5', 'YAYIN_ETIKETI: v0.1.6')
          release_text = release_text.replace('ESKI_YAYIN_ETIKETI: v0.1.4', 'ESKI_YAYIN_ETIKETI: v0.1.5')
          release_text = release_text.replace('PSForcer v0.1.5 İndirme Kararlılığı ve Uzak Görseller',
                                              'PSForcer v0.1.6 Yetkilendirme ve Büyük Görsel Başlık')
          release_text = release_text.replace(
              'Kare düğmesine basıldığında oluşan CE-34878-0 hatasına karşı PS4 iş parçacığı ve ağ başlatma düzeni yenilendi. Büyük HTTP tamponu heap alanına taşındı, dosya boyutu doğrulaması eklendi, uzak kapak ve arka plan görselleri geçici önbellekten gösterilmeye başlandı. Katalog artık GitHub üzerinden açılışta yenilenir; katalog değişiklikleri yeni uygulama sürümü oluşturmaz.',
              'Hugging Face HTTP 401 yanıtı için yetkili salt-okunur belirteç desteği ve açıklayıcı hata iletisi eklendi. P.T. kapak, header ve ekran görüntüleri paket içine alındı. Ayrıntı ekranı daha büyük Steam benzeri görsel başlıkla yenilendi. Katalog değişiklikleri tek başına yeni uygulama sürümü oluşturmaz.')
          release.write_text(release_text)

          readme = Path('README.md')
          readme_text = readme.read_text()
          if '## Hugging Face erişimi' not in readme_text:
              section = '''## Hugging Face erişimi

          Herkese açık Hugging Face dosyaları ek ayar gerektirmez. Bir bağlantı `401` döndürürse depo özel veya erişim denetimli olabilir. Yetkili kullanıcı, yalnızca okuma izni olan belirtecini PS4 üzerinde aşağıdaki dosyaya tek satır olarak yazabilir:

          ```text
          /data/psforcer/hf_token.txt
          ```

          Belirteç GitHub kataloğuna veya uygulama paketine eklenmemelidir. PSForcer belirteci yalnızca `https://huggingface.co/` isteklerinde kullanır.

          '''
              section = '\n'.join(line[10:] if line.startswith('          ') else line for line in section.splitlines()) + '\n'
              readme_text = readme_text.replace('## Derleme\n', section + '## Derleme\n')
              readme.write_text(readme_text)
          PY

          rm -f .github/workflows/v016-uygula.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m '401 erişimini, yerel görselleri ve büyük başlığı tamamla'
          git push origin "HEAD:${GITHUB_HEAD_REF}"
